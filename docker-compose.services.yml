include:
  - docker-compose.tools.yml
services:
  algashop-ordering:
    image: algashop/ordering:dev
    restart: no
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      SPRING_PROFILES_ACTIVE: docker
  algashop-billing:
    image: algashop/billing:dev
    restart: no
    ports:
      - '8082:8082'
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      SPRING_PROFILES_ACTIVE: docker
  algashop-product-catalog:
    image: algashop/product-catalog:dev
    restart: no
    ports:
      - '8083:8083'
    depends_on:
      mongodb-1:
        condition: service_healthy
      mongodb-2:
        condition: service_started
      mongodb-3:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      SPRING_PROFILES_ACTIVE: docker